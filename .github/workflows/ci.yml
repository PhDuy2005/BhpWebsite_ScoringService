name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ScoringService
    env:
      SCORINGSERVICE_STORAGE_ROOT_PATH: /tmp/scoring-service-storage
      SCORINGSERVICE_GRPC_HOST: 127.0.0.1
      SCORINGSERVICE_GRPC_PORT: 50051

    steps:
      - name: Checkout shared proto
        uses: actions/checkout@v4
        with:
          repository: PhDuy2005/DoAn1_BhpWebsite
          sparse-checkout: proto

      - name: Checkout ScoringService
        uses: actions/checkout@v4
        with:
          path: ScoringService

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ScoringService/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify shared proto checkout
        run: test -f ../proto/scoring/v1/scoring_normal.proto

      - name: Compile Python source
        run: python -m compileall app generated run.py run_grpc.py

      - name: Smoke import application
        run: |
          python - <<'PY'
          from app.grpc.server import create_server
          from app.main import app
          from app.services.answer_detection import load_templates

          assert app.title == "Scoring Service"
          templates = load_templates()
          expected_templates = {"candidate_id", "exam_id", "part_1", "part_2", "part_3"}
          assert expected_templates <= set(templates)

          server = create_server()
          server.stop(0)
          print("Smoke checks passed")
          PY

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ScoringService

      - name: Build Docker image
        run: docker build -f ScoringService/Dockerfile -t scoring-service:${{ github.sha }} .
